    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "cloudfront"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - terraform/cloudfront-foundation/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
