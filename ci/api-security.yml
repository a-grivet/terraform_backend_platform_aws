      when: never
    - if: '$PIPELINE_ACTION == "plan"'
    - changes:
        - terraform/waf-foundation/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
        - ci/api-security.yml

.rules_waf_dev:
