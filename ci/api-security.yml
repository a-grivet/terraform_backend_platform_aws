apply_cloudfront_main:
  extends:
    - .terraform_oidc_base
    - .oidc_assume_role
  stage: apply
  needs:
    # Upload and deployment must be applied first so their API IDs are available
    # in remote state when cloudfront re-plans. optional: true allows
    # TARGET_STACK=cloudfront runs where these stacks are already applied.
    - job: apply_upload_main
      optional: true
      artifacts: false
    - job: apply_deployment_main
      optional: true
      artifacts: false
  allow_failure: false
  resource_group: terraform-cloudfront-main
  environment:
    name: main/cloudfront
  variables:
    TF_ROLE_ARN: "${AWS_ROLE_ARN_CLOUDFRONT_MAIN}"
  rules:
    - if: '$PIPELINE_ACTION == "apply" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master") && ($TARGET_STACK == "all" || $TARGET_STACK == "cloudfront")'
    - when: never
  script:
    - test "${CONFIRMATION:-}" = "APPLY" || (echo "Set CONFIRMATION=APPLY pipeline variable to confirm" && exit 1)
    - . scripts/ci/ci_terraform.sh
    # Verify the saved plan matches the current commit before re-planning.
    - download_and_validate_plan_artifact "plan_cloudfront_main" "terraform/cloudfront-foundation/plan-metadata.env" "terraform/cloudfront-foundation/tfplan"
    - terraform -chdir=terraform/cloudfront-foundation init -backend-config=backend-main.hcl
    # Re-plan with fresh state so upload and deployment API IDs are captured.
    # The saved plan is used only for commit-SHA verification above.
    - terraform -chdir=terraform/cloudfront-foundation plan -var-file=main.tfvars -input=false -out=tfplan
    - terraform -chdir=terraform/cloudfront-foundation apply -input=false tfplan
    - echo "UPLOAD_CLOUDFRONT_DOMAIN=$(terraform -chdir=terraform/cloudfront-foundation output -raw upload_cloudfront_domain)" > terraform/cloudfront-foundation/deploy_outputs.env
    - echo "DEPLOYMENT_CLOUDFRONT_DOMAIN=$(terraform -chdir=terraform/cloudfront-foundation output -raw deployment_cloudfront_domain)" >> terraform/cloudfront-foundation/deploy_outputs.env
  artifacts:
    reports:
      dotenv: terraform/cloudfront-foundation/deploy_outputs.env
    expire_in: 1 day

destroy_cloudfront_dev:
  extends:
    - .terraform_oidc_base
    - .oidc_assume_role
  stage: destroy
  needs: []
  allow_failure: false
  resource_group: terraform-cloudfront-dev
  environment:
    name: dev/cloudfront
    action: stop
  variables:
    TF_ROLE_ARN: "${AWS_ROLE_ARN_CLOUDFRONT_DEV}"
    TF_VAR_environment: "dev"
  rules:
    - if: '$PIPELINE_ACTION == "destroy" && $CI_COMMIT_BRANCH == "dev" && $TARGET_STACK == "cloudfront"'
    - if: '$PIPELINE_ACTION == "destroy" && $CI_COMMIT_BRANCH == "dev" && $TARGET_STACK == "all"'
    - when: never
  script:
    - test "${CONFIRMATION:-}" = "DESTROY-DEV" || (echo "Set CONFIRMATION=DESTROY-DEV to confirm CloudFront dev destruction" && exit 1)
    - terraform -chdir=terraform/cloudfront-foundation init -backend-config=backend-dev.hcl
    - terraform -chdir=terraform/cloudfront-foundation destroy -var-file=dev.tfvars -input=false -auto-approve
