# ===========================================================================
# CloudFront foundation
# ===========================================================================

.rules_cloudfront:
  rules:
    - if: '$PIPELINE_ACTION == "destroy" || $PIPELINE_ACTION == "apply"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "cloudfront"'
      when: never
