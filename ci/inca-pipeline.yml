# ===========================================================================
# Deployment foundation
# ===========================================================================

.rules_deployment:
  rules:
    - if: '$PIPELINE_ACTION == "destroy" || $PIPELINE_ACTION == "apply"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "deployment"'
      when: never
    - if: '$PIPELINE_ACTION == "plan"'
    - changes:
        - lambdas/trigger-deployment/**/*
        - terraform/deployment-foundation/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
        - ci/inca-pipeline.yml

.rules_deployment_dev:
  rules:
    - if: '$PIPELINE_ACTION == "destroy" || $PIPELINE_ACTION == "apply"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "deployment"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - lambdas/trigger-deployment/**/*
        - terraform/deployment-foundation/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
        - ci/inca-pipeline.yml

.rules_deployment_main:
  rules:
    - if: '$PIPELINE_ACTION == "destroy" || $PIPELINE_ACTION == "apply"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "deployment"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes:
        - lambdas/trigger-deployment/**/*
        - terraform/deployment-foundation/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
        - ci/inca-pipeline.yml

test_deployment_lambdas:
  stage: validate
  image: python:3.12
  services: []
  rules: !reference [.rules_deployment, rules]
  script:
    - python -m unittest discover -s lambdas/trigger-deployment/tests

lint_deployment_lambdas:
  stage: validate
  image: python:3.12
  services: []
  rules: !reference [.rules_deployment, rules]
  script:
