        exit 1
      fi
      export TF_VAR_deployment_runner_image_tag="${RUNNER_SHA}"
    - terraform -chdir=terraform/deployment-foundation plan -var-file=main.tfvars -input=false -out=tfplan
    - terraform -chdir=terraform/deployment-foundation apply -input=false tfplan
    - echo "DEPLOYMENT_API_URL=$(terraform -chdir=terraform/deployment-foundation output -raw deployment_api_endpoint)" > terraform/deployment-foundation/deploy_outputs.env
    - echo "DEPLOYMENT_STATE_MACHINE_ARN=$(terraform -chdir=terraform/deployment-foundation output -raw deployment_state_machine_arn)" >> terraform/deployment-foundation/deploy_outputs.env
    - echo "ECS_TASK_ROLE_ARN=$(terraform -chdir=terraform/deployment-foundation output -raw ecs_task_role_arn)" >> terraform/deployment-foundation/deploy_outputs.env
    - |
      COGNITO_USER_POOL_ID="$(terraform -chdir=terraform/deployment-foundation output -raw cognito_user_pool_id)"
      COGNITO_CLIENT_ID="$(terraform -chdir=terraform/deployment-foundation output -raw cognito_client_id)"
      if [ -z "${COGNITO_USER_POOL_ID}" ] || [ -z "${COGNITO_CLIENT_ID}" ]; then
        echo "ERROR: Cognito outputs are empty — apply the cognito stack before the deployment foundation"
        exit 1
      fi
      echo "COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}" >> terraform/deployment-foundation/deploy_outputs.env
      echo "COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}" >> terraform/deployment-foundation/deploy_outputs.env
  artifacts:
    reports:
      dotenv: terraform/deployment-foundation/deploy_outputs.env
    expire_in: 1 day

smoke_test_deployment_main:
  extends:
    - .terraform_oidc_base
    - .oidc_assume_role
  stage: verify
  needs:
    - job: apply_deployment_main
      artifacts: true
    - job: apply_upload_main
      artifacts: true
  when: on_success
  allow_failure: false
  # API_URL and UPLOAD_INTENTS_TABLE_NAME come from apply_upload_main dotenv.
  # DEPLOYMENT_API_URL, DEPLOYMENT_STATE_MACHINE_ARN, COGNITO_* come from apply_deployment_main dotenv.
  variables:
    TF_ROLE_ARN: "${AWS_ROLE_ARN_DEPLOYMENT_MAIN}"
  rules:
    - if: '$PIPELINE_ACTION == "apply" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master") && ($TARGET_STACK == "all" || $TARGET_STACK == "deployment")'
    - when: never
  script:
    - apk add --no-cache bash curl jq zip
    - bash tests/integration/test_deployment_foundation_flow.sh tests/fixtures/blueprints/minimal-deploy-lab 300

destroy_deployment_dev:
  extends:
    - .terraform_oidc_base
    - .oidc_assume_role
  stage: destroy
  needs:
    - job: destroy_cloudfront_dev
      optional: true
  allow_failure: false
  resource_group: terraform-deployment-dev
  environment:
    name: dev/deployment
    action: stop
  variables:
    TF_ROLE_ARN: "${AWS_ROLE_ARN_DEPLOYMENT_DEV}"
    TF_VAR_environment: "dev"
    TF_VAR_deployment_runner_image_tag: "${CI_COMMIT_SHA}"
  rules:
    - if: '$PIPELINE_ACTION == "destroy" && $CI_COMMIT_BRANCH == "dev" && $TARGET_STACK == "deployment"'
    - if: '$PIPELINE_ACTION == "destroy" && $CI_COMMIT_BRANCH == "dev" && $TARGET_STACK == "all"'
    - when: never
  script:
    - test "${CONFIRMATION:-}" = "DESTROY-DEV" || (echo "Set CONFIRMATION=DESTROY-DEV to confirm deployment dev destruction" && exit 1)
    - terraform -chdir=terraform/deployment-foundation init -backend-config=backend-dev.hcl
    - terraform -chdir=terraform/deployment-foundation destroy -var-file=dev.tfvars -input=false -auto-approve

# ===========================================================================
# Learner sandbox roles
# ===========================================================================

.rules_learner_sandbox:
  rules:
    - if: '$PIPELINE_ACTION == "destroy" || $PIPELINE_ACTION == "apply"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "learner-sandbox"'
      when: never
    - if: '$PIPELINE_ACTION == "plan"'
    - changes:
        - terraform/learner-sandbox-roles/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
        - ci/inca-pipeline.yml

.rules_learner_sandbox_dev:
  rules:
    - if: '$PIPELINE_ACTION == "destroy" || $PIPELINE_ACTION == "apply"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "learner-sandbox"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - terraform/learner-sandbox-roles/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
        - ci/inca-pipeline.yml

.rules_learner_sandbox_main:
  rules:
    - if: '$PIPELINE_ACTION == "destroy" || $PIPELINE_ACTION == "apply"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && $TARGET_STACK != "all" && $TARGET_STACK != "learner-sandbox"'
      when: never
    - if: '$PIPELINE_ACTION == "plan" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes:
        - terraform/learner-sandbox-roles/**/*
        - .gitlab-ci.yml
        - ci/_templates.yml
        - ci/inca-pipeline.yml

validate_learner_sandbox_terraform:
  extends: .terraform_base
  stage: validate
  rules: !reference [.rules_learner_sandbox, rules]
  script:
    - terraform -chdir=terraform/learner-sandbox-roles init -backend=false
    - terraform -chdir=terraform/learner-sandbox-roles validate

plan_learner_sandbox_dev:
  extends:
    - .terraform_oidc_base
    - .oidc_assume_role
  stage: plan
  needs:
    - job: check_terraform_format
      optional: true
    - job: validate_learner_sandbox_terraform
      optional: true
    - job: lint_terraform
      optional: true
  variables:
    TF_ROLE_ARN: "${AWS_ROLE_ARN_LEARNER_SANDBOX}"
    TF_VAR_environment: "dev"
  rules: !reference [.rules_learner_sandbox_dev, rules]
  script:
    - terraform -chdir=terraform/learner-sandbox-roles init -backend-config=backend-dev.hcl
    - terraform -chdir=terraform/learner-sandbox-roles plan -var-file=dev.tfvars -input=false -out=tfplan
    - terraform -chdir=terraform/learner-sandbox-roles show -no-color tfplan > terraform/learner-sandbox-roles/tfplan.txt
    - terraform -chdir=terraform/learner-sandbox-roles show -json tfplan > terraform/learner-sandbox-roles/tfplan.json
    - echo "PLAN_PIPELINE_ID=${CI_PIPELINE_ID}" | tee terraform/learner-sandbox-roles/plan-metadata.env
    - echo "PLAN_COMMIT_SHA=${CI_COMMIT_SHA}" | tee -a terraform/learner-sandbox-roles/plan-metadata.env
    - |
      cat <<EOF | tee terraform/learner-sandbox-roles/plan-metadata.txt
      Learner sandbox roles plan created successfully.
      Pipeline ID recorded in artifact: ${CI_PIPELINE_ID}
      Commit SHA recorded in artifact: ${CI_COMMIT_SHA}
      Manual apply guardrails:
      - the apply job must be started manually
      - the Terraform plan artifact must exist
      - the recorded pipeline ID must match the current pipeline
      - the recorded commit SHA must match the current commit
      EOF
  artifacts:
    name: "learner-sandbox-roles-dev-plan-${CI_PIPELINE_ID}"
    expire_in: 1 hour
    reports:
      terraform: terraform/learner-sandbox-roles/tfplan.json
    paths:
      - terraform/learner-sandbox-roles/tfplan
      - terraform/learner-sandbox-roles/tfplan.txt
      - terraform/learner-sandbox-roles/tfplan.json
      - terraform/learner-sandbox-roles/plan-metadata.env
      - terraform/learner-sandbox-roles/plan-metadata.txt

apply_learner_sandbox_dev:
  extends:
    - .terraform_oidc_base
    - .oidc_assume_role
  stage: apply
  needs: []
  allow_failure: false
  resource_group: terraform-learner-sandbox
  environment:
    name: dev/learner-sandbox
  variables:
    TF_ROLE_ARN: "${AWS_ROLE_ARN_LEARNER_SANDBOX}"
  rules:
    - if: '$PIPELINE_ACTION == "apply" && $CI_COMMIT_BRANCH == "dev" && ($TARGET_STACK == "all" || $TARGET_STACK == "learner-sandbox")'
    - when: never
  script:
    - test "${CONFIRMATION:-}" = "APPLY" || (echo "Set CONFIRMATION=APPLY pipeline variable to confirm" && exit 1)
    - . scripts/ci/ci_terraform.sh
    - download_and_validate_plan_artifact "plan_learner_sandbox_dev" "terraform/learner-sandbox-roles/plan-metadata.env" "terraform/learner-sandbox-roles/tfplan"
    - terraform -chdir=terraform/learner-sandbox-roles init -backend-config=backend-dev.hcl
    - terraform -chdir=terraform/learner-sandbox-roles apply -input=false tfplan

