    paths:
      - terraform/learner-sandbox-roles/tfplan
      - terraform/learner-sandbox-roles/tfplan.txt
      - terraform/learner-sandbox-roles/tfplan.json
      - terraform/learner-sandbox-roles/plan-metadata.env
      - terraform/learner-sandbox-roles/plan-metadata.txt

apply_learner_sandbox_main:
  extends:
    - .terraform_oidc_base
