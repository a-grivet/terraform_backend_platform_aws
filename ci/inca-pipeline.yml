    - echo "PLAN_PIPELINE_ID=${CI_PIPELINE_ID}" | tee terraform/deployment-foundation/plan-metadata.env
    - echo "PLAN_COMMIT_SHA=${CI_COMMIT_SHA}" | tee -a terraform/deployment-foundation/plan-metadata.env
    - |
