apply_deployment_dev:
  extends:
    - .terraform_oidc_base
    - .oidc_assume_role
  stage: apply
  needs:
    # Cognito must be applied first so its remote state is available when
    # the deployment plan is refreshed. optional: true allows TARGET_STACK=deployment
    # runs where apply_cognito_dev is not triggered (cognito must already exist).
    - job: apply_cognito_dev
      optional: true
      artifacts: false
  allow_failure: false
  resource_group: terraform-deployment-dev
  environment:
    name: dev/deployment
  variables:
    TF_ROLE_ARN: "${AWS_ROLE_ARN_DEPLOYMENT_DEV}"
  rules:
    - if: '$PIPELINE_ACTION == "apply" && $CI_COMMIT_BRANCH == "dev" && ($TARGET_STACK == "all" || $TARGET_STACK == "deployment")'
    - when: never
  script:
    - test "${CONFIRMATION:-}" = "APPLY" || (echo "Set CONFIRMATION=APPLY pipeline variable to confirm" && exit 1)
    - . scripts/ci/ci_terraform.sh
    # Verify the saved plan matches the current commit before re-planning.
    - download_and_validate_plan_artifact "plan_deployment_dev" "terraform/deployment-foundation/plan-metadata.env" "terraform/deployment-foundation/tfplan"
    - terraform -chdir=terraform/deployment-foundation init -backend-config=backend-dev.hcl
    # Re-plan with fresh state so cognito remote state outputs are captured.
    # The saved plan is used only for commit-SHA verification above.
    - |
      RUNNER_SHA=$(aws ecr describe-images \
        --region "${AWS_REGION}" \
        --repository-name inca-terraform-runner \
        --image-ids imageTag=dev \
        --query 'imageDetails[0].imageTags[]' \
        --output text | tr '\t' '\n' | grep -E '^[0-9a-f]{40}$' | head -1)
      if [ -z "${RUNNER_SHA}" ]; then
        echo "ERROR: Could not resolve SHA tag for runner image :dev. Run the runner image pipeline first."
        exit 1
      fi
      export TF_VAR_deployment_runner_image_tag="${RUNNER_SHA}"
    - terraform -chdir=terraform/deployment-foundation plan -var-file=dev.tfvars -input=false -out=tfplan
    - terraform -chdir=terraform/deployment-foundation apply -input=false tfplan
    - echo "DEPLOYMENT_API_URL=$(terraform -chdir=terraform/deployment-foundation output -raw deployment_api_endpoint)" > terraform/deployment-foundation/deploy_outputs.env
    - echo "DEPLOYMENT_STATE_MACHINE_ARN=$(terraform -chdir=terraform/deployment-foundation output -raw deployment_state_machine_arn)" >> terraform/deployment-foundation/deploy_outputs.env
    - echo "ECS_TASK_ROLE_ARN=$(terraform -chdir=terraform/deployment-foundation output -raw ecs_task_role_arn)" >> terraform/deployment-foundation/deploy_outputs.env
    - |
      COGNITO_USER_POOL_ID="$(terraform -chdir=terraform/deployment-foundation output -raw cognito_user_pool_id)"
      COGNITO_CLIENT_ID="$(terraform -chdir=terraform/deployment-foundation output -raw cognito_client_id)"
      if [ -z "${COGNITO_USER_POOL_ID}" ] || [ -z "${COGNITO_CLIENT_ID}" ]; then
        echo "ERROR: Cognito outputs are empty — cognito must be applied before deployment foundation"
        exit 1
      fi
      echo "COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}" >> terraform/deployment-foundation/deploy_outputs.env
      echo "COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}" >> terraform/deployment-foundation/deploy_outputs.env
  artifacts:
    reports:
      dotenv: terraform/deployment-foundation/deploy_outputs.env
    expire_in: 1 day

